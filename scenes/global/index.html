<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>全局旋转提示</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #000;
      color: #f4f7fb;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(24px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));
    }

    .screen {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #000;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    .phone-wrap {
      position: relative;
      width: 138px;
      height: 138px;
    }

    .phone-shell {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 96px;
      border: 3px solid #67ff8f;
      border-radius: 16px;
      transform: translate(-50%, -50%);
      animation: phone-rotate 2.2s ease-in-out infinite;
      box-shadow: 0 0 26px rgba(103, 255, 143, 0.2);
    }

    .phone-screen {
      position: absolute;
      inset: 8px;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(103, 255, 143, 0.12), rgba(103, 255, 143, 0.02));
    }

    .phone-screen::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 4px;
      width: 16px;
      height: 3px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(103, 255, 143, 0.9);
    }

    .rotate-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px dashed rgba(103, 255, 143, 0.52);
    }

    .rotate-ring::before,
    .rotate-ring::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      border-top: 3px solid #67ff8f;
      border-right: 3px solid #67ff8f;
    }

    .rotate-ring::before {
      top: 10px;
      right: 28px;
      transform: rotate(12deg);
    }

    .rotate-ring::after {
      left: 28px;
      bottom: 10px;
      transform: rotate(192deg);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 40px);
      letter-spacing: 0.08em;
    }

    p {
      margin: 0;
      max-width: 300px;
      color: rgba(244, 247, 251, 0.8);
      font-size: 15px;
      line-height: 1.8;
    }

    .hint {
      font-size: 13px;
      letter-spacing: 0.08em;
      color: rgba(103, 255, 143, 0.82);
      text-transform: uppercase;
    }

    @keyframes phone-rotate {
      0%,
      12% {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      34%,
      66% {
        transform: translate(-50%, -50%) rotate(90deg);
      }
      88%,
      100% {
        transform: translate(-50%, -50%) rotate(0deg);
      }
    }
  </style>
</head>
<body>
  <div class="screen" aria-hidden="false">
    <div class="card" role="dialog" aria-modal="true" aria-labelledby="rotate-title">
      <div class="phone-wrap" aria-hidden="true">
        <div class="phone-shell">
          <div class="phone-screen"></div>
        </div>
        <div class="rotate-ring"></div>
      </div>
      <div class="hint">Landscape Required</div>
     
    </div>
  </div>

  <script src="./p.js"></script>
  <script>
    window.addEventListener("load", function () {
      try {
        window.SceneOrientation.ensureOrientation({
          expectedOrientation: "landscape"
        });
      } catch (error) {
        console.error(error);
        const fallback = document.createElement("div");
        fallback.style.cssText = "position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-size:18px;padding:24px;text-align:center;z-index:9999;";
        fallback.textContent = "哎呀，方向提示加载失败，请重试。";
        document.body.innerHTML = "";
        document.body.appendChild(fallback);
      }
    });
  </script>
</body>
</html>
